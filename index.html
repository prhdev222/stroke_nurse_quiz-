<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#C41E3A">
<title>Quiz Stroke Fast Track — พยาบาล รพ.สงฆ์</title>
<script>
(function(){
  try{
    var th=localStorage.getItem('strokeQuiz_theme');
    if(th==='dark'||th==='auto') document.documentElement.setAttribute('data-theme',th);
    else document.documentElement.removeAttribute('data-theme');
    var tx=localStorage.getItem('strokeQuiz_text');
    if(tx==='1'||tx==='2') document.documentElement.setAttribute('data-text',tx);
    else document.documentElement.removeAttribute('data-text');
  }catch(e){}
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(196,30,58,.08)}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;font-size:100%}
html[data-text="1"]{font-size:112.5%}
html[data-text="2"]{font-size:125%}
:root{
  color-scheme:light;
  --red:#C41E3A;--bg:#f5f4f0;--card:#fff;
  --tx:#1a1a18;--tx2:#6b6b67;--bl:#e5e3dc;
  --sbg:#EAF3DE;--stx:#27500A;--sbd:#97C459;
  --dbg:#FCEBEB;--dtx:#791F1F;--dbd:#F09595;
  --ibg:#E6F1FB;--itx:#185FA5;--ibd:#85B7EB;
  --wbg:#FAEEDA;--wtx:#633806;--wbd:#EF9F27;
  --nav-bg:#fff;--header-fg:#fff;
  --case-bg:#FFF8E7;--case-border:#E85D04;--case-title:#7B3C00;--case-tag-bg:#E85D04;
  --focus-ring:rgba(196,30,58,.14);
  --card-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --nav-shadow:0 -6px 24px rgba(0,0,0,.06);
  --progress-track:#e0ddd7;
}
html[data-theme="dark"]{
  color-scheme:dark;
  --red:#e86577;--bg:#121211;--card:#1e1e1c;
  --tx:#ebebe4;--tx2:#9c9c94;--bl:#3c3c38;
  --sbg:#243220;--stx:#a8d977;--sbd:#5a8040;
  --dbg:#3a2525;--dtx:#f0c4c4;--dbd:#7a4a4a;
  --ibg:#1a2733;--itx:#8ec5f0;--ibd:#3d5e80;
  --wbg:#2f2818;--wtx:#e8c98a;--wbd:#b8893a;
  --nav-bg:#1a1a18;--header-fg:#fff;
  --case-bg:#2c2419;--case-border:#d9944a;--case-title:#f2d9a8;--case-tag-bg:#c9782e;
  --focus-ring:rgba(232,101,119,.3);
  --card-shadow:0 2px 16px rgba(0,0,0,.45);
  --nav-shadow:0 -6px 28px rgba(0,0,0,.4);
  --progress-track:#353532;
}
@media (prefers-color-scheme:dark){
  html[data-theme="auto"]{
    color-scheme:dark;
    --red:#e86577;--bg:#121211;--card:#1e1e1c;
    --tx:#ebebe4;--tx2:#9c9c94;--bl:#3c3c38;
    --sbg:#243220;--stx:#a8d977;--sbd:#5a8040;
    --dbg:#3a2525;--dtx:#f0c4c4;--dbd:#7a4a4a;
    --ibg:#1a2733;--itx:#8ec5f0;--ibd:#3d5e80;
    --wbg:#2f2818;--wtx:#e8c98a;--wbd:#b8893a;
    --nav-bg:#1a1a18;--header-fg:#fff;
    --case-bg:#2c2419;--case-border:#d9944a;--case-title:#f2d9a8;--case-tag-bg:#c9782e;
    --focus-ring:rgba(232,101,119,.3);
    --card-shadow:0 2px 16px rgba(0,0,0,.45);
    --nav-shadow:0 -6px 28px rgba(0,0,0,.4);
    --progress-track:#353532;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;transition:background-color .2s ease,color .2s ease}
.header{background:var(--red);color:var(--header-fg);padding:max(14px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) 12px max(12px, env(safe-area-inset-left, 0px))}
.header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;max-width:560px;margin:0 auto}
.header-text{flex:1;min-width:0;text-align:center;padding:0 4px}
.header h1{font-size:clamp(1.0625rem,4.5vw,1.25rem);font-weight:800;margin-bottom:4px;line-height:1.25}
.header p{font-size:0.8125rem;opacity:.92;line-height:1.4}
.header-actions{display:flex;flex-shrink:0;gap:6px;padding-top:2px}
.header-icon-btn{width:44px;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.14);color:var(--header-fg);font-size:1.125rem;font-weight:700;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.header-icon-btn:active{opacity:.88;transform:scale(.97)}
#btnTextSize{font-size:0.9375rem;letter-spacing:-0.02em}
.intro-screen{padding:18px max(16px, env(safe-area-inset-left, 0px)) calc(100px + env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-right, 0px))}
.intro-card{background:var(--card);border-radius:16px;padding:24px 20px;box-shadow:var(--card-shadow)}
.intro-card h2{font-size:1.125rem;font-weight:800;margin-bottom:6px;color:var(--red)}
.intro-card p{font-size:0.8125rem;color:var(--tx2);margin-bottom:20px;line-height:1.7}
.intro-footnote{font-size:0.6875rem;color:var(--tx2);margin-top:14px;text-align:center;line-height:1.6}
.intro-case{background:var(--case-bg);border-left:4px solid var(--case-border);padding:14px;border-radius:10px;font-size:0.8125rem;line-height:1.8;margin-bottom:20px}
.intro-case h3{font-size:0.8125rem;font-weight:700;color:var(--case-title);margin-bottom:6px}
.case-tag{display:inline-block;background:var(--case-tag-bg);color:#fff;font-size:0.6875rem;padding:2px 8px;border-radius:10px;margin-right:4px;margin-bottom:4px}
.field-lbl{font-size:0.75rem;color:var(--tx2);margin-bottom:5px;font-weight:600}
.field-wrap{margin-bottom:16px}
.field-inp{width:100%;padding:12px 14px;border:1.5px solid var(--bl);border-radius:10px;font-size:0.9375rem;font-family:inherit;background:var(--card);color:var(--tx);outline:none;appearance:none;-webkit-appearance:none}
.field-inp:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--focus-ring)}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--tx2);pointer-events:none;font-size:0.875rem}
/* other input */
#otherWardWrap{display:none;margin-top:8px}
#otherWardWrap .field-inp{border-color:var(--wbd);background:var(--wbg)}
#otherWardWrap .field-inp:focus{border-color:var(--red)}
.btn-start{width:100%;padding:15px 16px;border:none;border-radius:12px;background:var(--red);color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;min-height:48px;touch-action:manipulation}
.btn-start:disabled{opacity:.4;cursor:not-allowed}
.case-box{background:var(--case-bg);border-left:4px solid var(--case-border);margin:12px max(12px, env(safe-area-inset-left, 0px)) 12px max(12px, env(safe-area-inset-right, 0px));padding:14px;border-radius:12px;font-size:0.75rem;line-height:1.8;display:none;box-shadow:var(--card-shadow)}
.case-box h2{font-size:0.8125rem;font-weight:700;color:var(--case-title);margin-bottom:6px}
.case-box .case-placeholder{color:var(--tx2);font-size:0.75rem}
.progress-wrap{padding:10px max(16px, env(safe-area-inset-left, 0px)) 0 max(16px, env(safe-area-inset-right, 0px));display:none}
.progress-bar{height:6px;background:var(--progress-track);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:var(--red);border-radius:3px;transition:width .4s}
.progress-label{font-size:0.6875rem;color:var(--tx2);text-align:right}
.quiz-wrap{padding:10px max(16px, env(safe-area-inset-left, 0px)) calc(100px + env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-right, 0px));display:none}
.q-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--card-shadow)}
.q-num{font-size:0.6875rem;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.q-group{font-size:0.625rem;color:var(--tx2);margin-bottom:4px}
.q-text{font-size:0.9375rem;font-weight:600;line-height:1.6;margin-bottom:14px}
.q-hint{font-size:0.75rem;color:var(--itx);background:var(--ibg);padding:8px 12px;border-radius:8px;margin-bottom:12px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;border-radius:10px;border:1.5px solid var(--bl);background:var(--card);font-size:0.875rem;cursor:pointer;text-align:left;font-family:inherit;line-height:1.5;transition:transform .12s ease,background .12s ease,border-color .12s ease;touch-action:manipulation}
.opt:active{transform:scale(.985)}
.opt.reveal{background:var(--sbg);border-color:var(--sbd);color:var(--stx);font-weight:600}
.opt.wrong{background:var(--dbg);border-color:var(--dbd);color:var(--dtx)}
.opt:disabled{cursor:default}
.explanation{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:0.8125rem;line-height:1.7;display:none}
.explanation.show{display:block}
.explanation.correct-exp{background:var(--sbg);color:var(--stx);border:1px solid var(--sbd)}
.explanation.wrong-exp{background:var(--wbg);color:var(--wtx);border:1px solid var(--wbd)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav-bg);border-top:1px solid var(--bl);padding:12px max(16px, env(safe-area-inset-left, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-right, 0px));display:none;gap:10px;box-shadow:var(--nav-shadow)}
.btn-prev{flex:1;padding:12px 14px;border:1.5px solid var(--bl);border-radius:12px;background:var(--card);font-size:0.875rem;font-family:inherit;cursor:pointer;color:var(--tx2);min-height:48px;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.btn-next{flex:2;padding:12px 14px;border:none;border-radius:12px;background:var(--red);color:#fff;font-size:0.875rem;font-weight:700;font-family:inherit;cursor:pointer;min-height:48px;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.btn-next:disabled{opacity:.4;cursor:not-allowed}
.score-screen{display:none;padding:24px max(16px, env(safe-area-inset-left, 0px)) calc(28px + env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-right, 0px));text-align:center;max-width:500px;margin:0 auto}
.score-screen .stats-box{text-align:left;margin-top:8px}
.score-icon{font-size:3.75rem;margin-bottom:12px;line-height:1}
.score-name{font-size:0.8125rem;color:var(--tx2);margin-bottom:4px;padding:6px 14px;background:var(--card);border-radius:20px;display:inline-block;border:0.5px solid var(--bl);max-width:100%;line-height:1.45;word-break:break-word;box-sizing:border-box}
.score-title{font-size:1.375rem;font-weight:800;margin-bottom:6px;margin-top:8px}
.score-sub{font-size:0.875rem;color:var(--tx2);margin-bottom:16px}
.score-big{font-size:3.25rem;font-weight:900;color:var(--red);margin-bottom:2px;line-height:1}
.score-max{font-size:1rem;color:var(--tx2);margin-bottom:16px}
.score-case-recap{background:var(--case-bg);border-left:4px solid var(--case-border);border-radius:12px;padding:14px;margin:0 auto 16px;max-width:100%;font-size:0.75rem;line-height:1.75;color:var(--tx2);text-align:left}
.score-case-recap h3{font-size:0.8125rem;font-weight:700;color:var(--case-title);margin-bottom:8px}
.score-case-recap .recap-this{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bl);font-size:0.75rem;color:var(--tx)}
.score-bars{margin:16px 0;text-align:left}
.score-bars-heading{font-size:0.8125rem;font-weight:600;margin-bottom:10px;color:var(--tx2)}
.score-bar-item{margin-bottom:10px}
.score-bar-label{font-size:0.75rem;color:var(--tx2);margin-bottom:3px;display:flex;justify-content:space-between}
.score-bar-track{height:8px;background:var(--progress-track);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .8s}
.send-status{padding:10px 14px;border-radius:10px;font-size:0.8125rem;margin-bottom:12px;line-height:1.5;min-height:44px;display:flex;align-items:center;justify-content:center}
.send-status.sending{background:var(--ibg);color:var(--itx)}
.send-status.ok{background:var(--sbg);color:var(--stx)}
.send-status.err{background:var(--wbg);color:var(--wtx)}
.btn-restart{width:100%;padding:15px 16px;border:none;border-radius:12px;background:var(--red);color:#fff;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;min-height:48px;touch-action:manipulation}
.btn-review{width:100%;padding:15px 16px;border:1.5px solid var(--red);border-radius:12px;background:var(--card);color:var(--red);font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;min-height:48px;touch-action:manipulation}
.review-badge{display:none;padding:4px 12px;border-radius:20px;font-size:0.75rem;margin-bottom:10px;border:1px solid}
.review-badge.show{display:inline-block}
.stats-box{background:var(--ibg);border:1px solid var(--ibd);border-radius:12px;padding:14px;margin-bottom:18px;font-size:0.8125rem;line-height:1.65;color:var(--itx)}
.stats-box code{font-size:0.85em;opacity:.92;word-break:break-word}
.stats-box .stats-summary{font-weight:700;margin-bottom:8px;font-size:0.875rem}
.stats-box .stats-subhead{font-size:0.6875rem;opacity:.9;margin-bottom:8px;color:var(--itx)}
.stats-box .stats-top-item{padding:8px 0;border-top:1px solid var(--bl);font-size:0.8125rem}
.stats-box .stats-top-item:first-of-type{border-top:none;padding-top:0}
.stats-box .stats-ward{color:var(--tx2);font-size:0.75rem}
.stats-box .stats-loading,.stats-box .stats-err,.stats-box .stats-empty{font-size:0.75rem;opacity:.95}
.stats-box .stats-err{color:var(--dtx)}
.btn-refresh-stats{margin-top:10px;width:100%;padding:8px;border:1px solid var(--ibd);border-radius:8px;background:var(--card);color:var(--itx);font-size:0.75rem;font-weight:600;font-family:inherit;cursor:pointer}
.btn-refresh-stats{min-height:44px;touch-action:manipulation}
.btn-refresh-stats:active{transform:scale(.99)}

/* —— Mobile: จอแคบ / นิ้วสัมผัส —— */
@media (max-width:480px){
  .intro-screen{padding-top:14px;padding-bottom:calc(118px + env(safe-area-inset-bottom, 0px))}
  .intro-card{padding:20px 16px;border-radius:14px}
  .intro-card h2{font-size:1.0625rem}
  .field-inp{font-size:1rem;padding:14px 16px;border-radius:12px}
  .select-wrap::after{right:16px}
  .case-box{margin-left:max(10px, env(safe-area-inset-left, 0px));margin-right:max(10px, env(safe-area-inset-right, 0px));padding:12px 12px 12px 14px;font-size:0.71875rem}
  .case-box h2{font-size:0.75rem}
  .case-tag{font-size:0.625rem;padding:3px 8px}
  .quiz-wrap{padding-bottom:calc(112px + env(safe-area-inset-bottom, 0px))}
  .q-card{padding:18px 14px;margin-bottom:10px;border-radius:14px}
  .q-text{font-size:1rem;line-height:1.55;margin-bottom:12px}
  .q-hint{font-size:0.8125rem;padding:10px 12px;line-height:1.55}
  .q-group{font-size:0.625rem}
  .opt{min-height:48px;padding:14px 16px;font-size:0.9375rem;line-height:1.45;border-radius:12px}
  .explanation{font-size:0.8125rem;padding:12px;line-height:1.65}
  .bottom-nav{gap:12px;padding-top:14px}
  .btn-prev,.btn-next{font-size:0.9375rem;border-radius:14px}
  .score-screen{padding-top:20px}
  .score-icon{font-size:3.25rem}
  .score-big{font-size:clamp(2.5rem,14vw,3.25rem)}
  .score-title{font-size:clamp(1.125rem,5.5vw,1.375rem)}
  .score-sub{font-size:0.8125rem;padding:0 4px}
  .score-name{font-size:0.75rem;padding:8px 12px}
  .score-case-recap{padding:12px;font-size:0.71875rem;border-radius:10px;margin-left:0;margin-right:0}
  .score-case-recap h3{font-size:0.75rem}
  .stats-box{padding:12px;border-radius:10px}
  .stats-box .stats-summary{font-size:0.8125rem}
}
@media (max-width:360px){
  .header h1{font-size:1rem}
  .intro-card{padding:18px 14px}
  .q-card{padding:16px 12px}
  .opt{font-size:0.875rem}
}

@media (prefers-reduced-motion:reduce){
  .opt,.btn-prev,.btn-next,.btn-start,.btn-restart,.btn-review,.progress-fill{transition:none!important}
  .opt:active,.btn-refresh-stats:active{transform:none}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <div class="header-text">
      <h1>🧠 Quiz Stroke Fast Track</h1>
      <p>โรงพยาบาลสงฆ์ — กลุ่มงานอายุรกรรม</p>
    </div>
    <div class="header-actions" role="toolbar" aria-label="การตั้งค่าแสดงผล">
      <button type="button" class="header-icon-btn" id="btnTheme" title="โหมดสี" aria-label="สลับโหมดสว่าง มืด หรือตามระบบ">🌓</button>
      <button type="button" class="header-icon-btn" id="btnTextSize" title="ขนาดตัวอักษร" aria-label="ปรับขนาดตัวอักษร">A</button>
    </div>
  </div>
</header>

<!-- INTRO -->
<div class="intro-screen" id="introScreen">
  <div class="intro-card">
    <h2>ยินดีต้อนรับ 👋</h2>
    <p>กรอกข้อมูลก่อนเริ่มทำแบบทดสอบ<br>10 ข้อ — ใช้เวลาประมาณ 5–10 นาที</p>

    <div class="field-wrap">
      <div class="field-lbl">ชื่อ-นามสกุล <span style="color:var(--red)">*</span></div>
      <input class="field-inp" id="inputName" placeholder="เช่น นางสาวสมใจ ใจดี" oninput="checkReady()">
    </div>

    <div class="field-wrap">
      <div class="field-lbl">Ward / หน่วยงาน <span style="color:var(--red)">*</span></div>
      <div class="select-wrap">
        <select class="field-inp" id="inputWard" onchange="onWardChange()">
          <option value="">— เลือก Ward / หน่วยงาน —</option>
          <option value="MED">MED</option>
          <option value="Surg">Surg</option>
          <option value="Ortho">Ortho</option>
          <option value="EYE">EYE</option>
          <option value="ENT">ENT</option>
          <option value="ER">ER</option>
          <option value="LAB">LAB</option>
          <option value="Other">Other ระบุเอง</option>
        </select>
      </div>
      <!-- ช่องกรอกเพิ่ม เมื่อเลือก Other -->
      <div id="otherWardWrap">
        <input class="field-inp" id="inputOtherWard"
          placeholder="ระบุหน่วยงาน เช่น ICU, Cardio, X-ray..."
          oninput="checkReady()">
      </div>
    </div>

    <button class="btn-start" id="btnStart" onclick="startQuiz()" disabled>
      เริ่มทำแบบทดสอบ →
    </button>

    <div class="intro-footnote">
      🔒 บันทึกเฉพาะชื่อ, Ward และคะแนน เพื่อติดตามการเรียนรู้ของทีม
    </div>
  </div>
</div>

<!-- CASE BOX (เติมเนื้อหาเมื่อเริ่มทำ — สุ่มจาก quiz-cases.js) -->
<div class="case-box" id="caseBox">
  <h2>📋 เคสของรอบนี้</h2>
  <p class="case-placeholder">กดเริ่มทำแบบทดสอบเพื่อสุ่มเคส</p>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>
<div class="quiz-wrap" id="quizWrap"></div>

<!-- SCORE -->
<div class="score-screen" id="scoreScreen">
  <div class="score-icon" id="scoreIcon"></div>
  <div class="score-name" id="scoreName"></div>
  <div class="score-title" id="scoreTitle"></div>
  <div class="score-sub" id="scoreSub"></div>
  <div class="score-big" id="scoreBig"></div>
  <div class="score-max" id="scoreMax"></div>
  <div class="score-case-recap" id="scoreCaseRecap"></div>
  <div id="sendStatus" class="send-status"></div>
  <div class="stats-box" id="statsBox" hidden></div>
  <div class="score-bars" id="scoreBars"></div>
  <button class="btn-review" onclick="startReview()">🔍 ดูเฉลยทั้งหมด</button>
  <button class="btn-restart" onclick="restart()">🔄 ทำใหม่อีกครั้ง</button>
</div>

<!-- NAV -->
<div class="bottom-nav" id="bottomNav">
  <button class="btn-prev" id="btnPrev" onclick="goBack()">← ก่อนหน้า</button>
  <button class="btn-next" id="btnNext" onclick="goNext()" disabled>ถัดไป →</button>
</div>

<script src="quiz-cases.js"></script>
<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycbwYgKjyg9-uEb29HEuNiKLk8mdvc8-jBNgAe-FvCHHkfO0AHDEWanp7J-4WQdWyk_CC/exec';
const TOKEN='PRH2024STROKE';
const QUIZ_LEN=10;

function caseTypesRecapHtml(thisRoundLine){
  var h='<h3>📋 สรุป: แบบทดสอบมี 5 ชุด (เคสคลินิก 4 + NIHSS)</h3>';
  h+='<p style="margin:0">ทุกครั้งที่กดเริ่ม ระบบจะ<strong>สุ่ม 1 ใน 5 ชุด</strong>ดังนี้:</p>';
  h+='<p style="margin:8px 0 0"><strong>เคส 1</strong> — Fast Track (มีผู้เห็น onset, Warfarin, BP สูง)<br>';
  h+='<strong>เคส 2</strong> — Wake-up Stroke (ไม่ทราบ onset ชัด — เน้น LSN; มักใช้ advanced imaging ประกอบทีม; ไม่มี anticoag, BP ปกติ)<br>';
  h+='<strong>เคส 3</strong> — นอกช่วงเวลา (~2 วัน, อาการเล็กน้อย — แนว conservative)<br>';
  h+='<strong>เคส 4</strong> — Hemorrhagic stroke / ICH (ปวดหัวเฉียบพลัน, BP สูงมาก, CT เลือดออก basal ganglia)<br>';
  h+='<strong>NIHSS Training</strong> — แบบฝึกประเมิน NIHSS สองภาษา (พยาบาล)</p>';
  if(thisRoundLine) h+='<div class="recap-this"><strong>รอบนี้:</strong> '+thisRoundLine+'</div>';
  return h;
}

let Q=[];
let activeCase=null;
let cur=0,ans=new Array(QUIZ_LEN).fill(null),rev=false;
let userName='',userWard='';

const THEME_KEY='strokeQuiz_theme';
const TEXT_KEY='strokeQuiz_text';
function getTheme(){
  var t=document.documentElement.getAttribute('data-theme');
  return t==='dark'||t==='auto'?t:'light';
}
function cycleTheme(){
  var t=getTheme();
  var next=t==='light'?'dark':t==='dark'?'auto':'light';
  if(next==='light'){
    document.documentElement.removeAttribute('data-theme');
    try{ localStorage.setItem(THEME_KEY,'light'); }catch(e){}
  }else{
    document.documentElement.setAttribute('data-theme',next);
    try{ localStorage.setItem(THEME_KEY,next); }catch(e){}
  }
  updateThemeColorMeta();
  updateDisplayButtons();
}
function cycleTextSize(){
  var tx=document.documentElement.getAttribute('data-text')||'';
  var next=tx===''?'1':tx==='1'?'2':'';
  if(next) document.documentElement.setAttribute('data-text',next);
  else document.documentElement.removeAttribute('data-text');
  try{
    if(next) localStorage.setItem(TEXT_KEY,next);
    else localStorage.removeItem(TEXT_KEY);
  }catch(e){}
  updateDisplayButtons();
}
function getEffectiveDark(){
  var t=document.documentElement.getAttribute('data-theme');
  if(t==='dark') return true;
  if(t==='light'||!t) return false;
  try{ return window.matchMedia('(prefers-color-scheme: dark)').matches; }catch(e){ return false; }
}
function updateThemeColorMeta(){
  var m=document.querySelector('meta[name="theme-color"]');
  if(m) m.content=getEffectiveDark()?'#121211':'#C41E3A';
}
function updateDisplayButtons(){
  var t=getTheme();
  var bt=document.getElementById('btnTheme');
  var bx=document.getElementById('btnTextSize');
  if(bt){
    if(t==='dark'){
      bt.textContent='🌙';
      bt.title='โหมดมืด — แตะเพื่อตามระบบ';
      bt.setAttribute('aria-label','โหมดมืด แตะเพื่อสลับเป็นตามระบบ');
    }else if(t==='auto'){
      bt.textContent='🌓';
      bt.title='ตามระบบ — แตะเพื่อโหมดสว่าง';
      bt.setAttribute('aria-label','ตามระบบ แตะเพื่อสลับเป็นโหมดสว่าง');
    }else{
      bt.textContent='🌞';
      bt.title='โหมดสว่าง — แตะเพื่อโหมดมืด';
      bt.setAttribute('aria-label','โหมดสว่าง แตะเพื่อสลับเป็นโหมดมืด');
    }
  }
  if(bx){
    var tx=document.documentElement.getAttribute('data-text')||'';
    if(tx==='2'){
      bx.textContent='A++';
      bx.title='ตัวใหญ่มาก — แตะเพื่อขนาดเริ่มต้น';
      bx.setAttribute('aria-label','ตัวใหญ่มาก แตะเพื่อขนาดเริ่มต้น');
    }else if(tx==='1'){
      bx.textContent='A+';
      bx.title='ตัวใหญ่ — แตะเพื่อใหญ่ขึ้นอีก';
      bx.setAttribute('aria-label','ตัวใหญ่ แตะเพื่อขยายอีก');
    }else{
      bx.textContent='A';
      bx.title='ขนาดเริ่มต้น — แตะเพื่อขยายตัวอักษร';
      bx.setAttribute('aria-label','ขนาดเริ่มต้น แตะเพื่อขยายตัวอักษร');
    }
  }
}
function initDisplayPrefs(){
  updateThemeColorMeta();
  updateDisplayButtons();
  var bt=document.getElementById('btnTheme');
  var bx=document.getElementById('btnTextSize');
  if(bt) bt.addEventListener('click',cycleTheme);
  if(bx) bx.addEventListener('click',cycleTextSize);
  try{
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
      if(document.documentElement.getAttribute('data-theme')==='auto') updateThemeColorMeta();
    });
  }catch(e){}
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',initDisplayPrefs);
else initDisplayPrefs();

// ===== สถิติจาก Sheet (JSONP — หลีกเลี่ยง CORS ของ Google Apps Script) =====
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}
function renderStatsBox(data){
  const box=document.getElementById('statsBox');
  if(!box) return;
  box.hidden=false;
  if(!data||!data.ok){
    box.innerHTML='<div class="stats-err">โหลดสถิติไม่ได้ — ต้องเพิ่ม <code>doGet</code> ใน Google Apps Script ตามไฟล์ <code>google-apps-script/doGet-stats.gs</code> แล้ว Deploy เว็บแอปใหม่</div>';
    return;
  }
  const total=data.total??0;
  const top=data.topTwo||[];
  let rows='';
  if(top.length===0){
    rows='<div class="stats-empty">ยังไม่มีผู้ทำแบบทดสอบในชีต</div>';
  }else{
    top.forEach((r,i)=>{
      rows+='<div class="stats-top-item"><strong>อันดับ '+(i+1)+'</strong> '+escapeHtml(r.name)+' <span class="stats-ward">· '+escapeHtml(r.ward||'—')+'</span><br>'+r.score+' / '+r.total+' ข้อ ('+r.pct+'%)</div>';
    });
  }
  box.innerHTML='<div class="stats-summary">ผู้ทำแบบทดสอบทั้งหมด <strong>'+total+'</strong> คน</div>'+
    '<div class="stats-subhead">คะแนนสูงสุด 2 อันดับ (ถ้าคะแนนเท่ากัน เรียงจากรอบล่าสุด)</div>'+rows+
    '<button type="button" class="btn-refresh-stats" onclick="loadStats()">↻ รีเฟรชสถิติ</button>';
}
function loadStats(){
  const box=document.getElementById('statsBox');
  if(!box) return;
  box.hidden=false;
  box.innerHTML='<div class="stats-loading">⏳ กำลังโหลดสถิติ...</div>';
  const cb='_strokeQuizStats_'+Date.now();
  const t=setTimeout(function(){
    cleanup();
    renderStatsBox({ok:false});
  },15000);
  function cleanup(){
    clearTimeout(t);
    try{ delete window[cb]; }catch(_){}
    const old=document.getElementById('stats-jsonp');
    if(old) old.remove();
  }
  window[cb]=function(data){
    cleanup();
    renderStatsBox(data);
  };
  const s=document.createElement('script');
  s.id='stats-jsonp';
  s.onerror=function(){ cleanup(); renderStatsBox({ok:false}); };
  s.src=SHEET_URL+'?action=stats&token='+encodeURIComponent(TOKEN)+'&callback='+encodeURIComponent(cb);
  document.head.appendChild(s);
}

// ===== WARD DROPDOWN =====
function onWardChange(){
  const w=document.getElementById('inputWard').value;
  const otherWrap=document.getElementById('otherWardWrap');
  const otherInp=document.getElementById('inputOtherWard');
  if(w==='Other'){
    otherWrap.style.display='block';
    otherInp.focus();
  } else {
    otherWrap.style.display='none';
    otherInp.value='';
  }
  checkReady();
}

function checkReady(){
  const n=document.getElementById('inputName').value.trim();
  const w=document.getElementById('inputWard').value;
  const other=document.getElementById('inputOtherWard').value.trim();
  const wardOk = w && (w!=='Other' || other.length>0);
  document.getElementById('btnStart').disabled=!(n&&wardOk);
}

function getWardValue(){
  const w=document.getElementById('inputWard').value;
  if(w==='Other'){
    const other=document.getElementById('inputOtherWard').value.trim();
    return 'Other: '+other;
  }
  return w;
}

function mountCaseBox(c){
  document.getElementById('caseBox').innerHTML='<h2>📋 เคสของรอบนี้: '+c.title+'</h2>'+c.caseHtml;
}

function startQuiz(){
  if(typeof CASE_BANK==='undefined'||!CASE_BANK||!CASE_BANK.length){
    alert('โหลดไฟล์ quiz-cases.js ไม่สำเร็จ — ตรวจสอบว่าเปิดหน้าเว็บจากโฟลเดอร์เดียวกับไฟล์นี้');
    return;
  }
  userName=document.getElementById('inputName').value.trim();
  userWard=getWardValue();
  activeCase=CASE_BANK[Math.floor(Math.random()*CASE_BANK.length)];
  Q=activeCase.questions;
  cur=0;ans=new Array(Q.length).fill(null);rev=false;
  mountCaseBox(activeCase);
  document.getElementById('introScreen').style.display='none';
  ['caseBox','progressWrap','quizWrap'].forEach(id=>document.getElementById(id).style.display='block');
  document.getElementById('bottomNav').style.display='flex';
  render();scrollTo(0,0);
}

function render(){
  if(!Q.length)return;
  const q=Q[cur],done=ans[cur]!==null;
  document.getElementById('progressFill').style.width=((cur+1)/Q.length*100)+'%';
  document.getElementById('progressLabel').textContent='ข้อ '+(cur+1)+' / '+Q.length;
  let h='<div class="q-card">';
  if(rev){const ok=ans[cur]===q.a;h+='<span class="review-badge show" style="background:'+(ok?'var(--sbg)':'var(--dbg)')+';color:'+(ok?'var(--stx)':'var(--dtx)')+';border-color:'+(ok?'var(--sbd)':'var(--dbd)')+'\">'+(ok?'✓ ตอบถูก':'✗ ตอบผิด')+'</span>';}
  h+='<div class="q-group">'+q.g+'</div><div class="q-num">ข้อที่ '+(cur+1)+'</div><div class="q-text">'+q.t+'</div><div class="q-hint">💡 '+q.h+'</div><div class="options">';
  q.o.forEach((o,i)=>{
    let c='opt';
    if(done||rev){if(i===q.a)c+=' reveal';else if(i===ans[cur]&&ans[cur]!==q.a)c+=' wrong';}
    h+='<button class="'+c+'" onclick="pick('+i+')" '+(done||rev?'disabled':'')+'>'+String.fromCharCode(65+i)+'. '+o+'</button>';
  });
  h+='</div>';
  if(done||rev){const ok=ans[cur]===q.a;h+='<div class="explanation show '+(ok?'correct-exp':'wrong-exp')+'">'+(ok?'✅':'📖')+' <strong>'+(ok?'ถูกต้อง!':'เฉลย:')+'</strong> '+q.e+'</div>';}
  h+='</div>';
  document.getElementById('quizWrap').innerHTML=h;
  document.getElementById('btnPrev').style.display=cur===0?'none':'block';
  const bn=document.getElementById('btnNext');
  if(cur===Q.length-1){
    if(rev){bn.textContent='✓ เสร็จสิ้น';bn.disabled=false;bn.onclick=showScore;}
    else{bn.textContent=done?'📊 ดูผลคะแนน':'ถัดไป →';bn.disabled=!done;if(done)bn.onclick=showScore;}
  }else{bn.textContent='ถัดไป →';bn.disabled=!done&&!rev;bn.onclick=goNext;}
}

function pick(i){if(ans[cur]!==null)return;ans[cur]=i;render();}
function goNext(){if(cur<Q.length-1){cur++;render();scrollTo(0,0);}}
function goBack(){if(cur>0){cur--;render();scrollTo(0,0);}}

async function showScore(){
  ['caseBox','progressWrap','quizWrap','bottomNav'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('scoreScreen').style.display='block';
  const correct=ans.filter((a,i)=>a===Q[i].a).length,pct=Math.round(correct/Q.length*100);
  let icon='🏆',title='ยอดเยี่ยม!',sub='เข้าใจ Stroke Fast Track ได้เป็นอย่างดีค่ะ';
  if(pct<60){icon='📚';title='ต้องทบทวนเพิ่มเติม';sub='ลองอ่าน guideline แล้วทำใหม่อีกครั้งนะคะ';}
  else if(pct<80){icon='👍';title='ทำได้ดี!';sub='เข้าใจ workflow ส่วนใหญ่ มีจุดที่ควรทบทวนเล็กน้อย';}
  document.getElementById('scoreIcon').textContent=icon;
  document.getElementById('scoreName').textContent='👤 '+userName+' · 🏥 '+userWard+(activeCase?' · 📋 '+activeCase.shortTitle:'');
  document.getElementById('scoreTitle').textContent=title;
  document.getElementById('scoreSub').textContent=sub;
  document.getElementById('scoreBig').textContent=correct;
  document.getElementById('scoreMax').textContent='/ '+Q.length+' ข้อ ('+pct+'%)';
  document.getElementById('scoreCaseRecap').innerHTML=caseTypesRecapHtml(activeCase?activeCase.title:'');
  const grp={};
  Q.forEach((q,i)=>{if(!grp[q.g])grp[q.g]={t:0,c:0};grp[q.g].t++;if(ans[i]===q.a)grp[q.g].c++;});
  let b='<div class="score-bars-heading">คะแนนแยกตามกลุ่ม</div>';
  Object.entries(grp).forEach(([g,v])=>{
    const gp=Math.round(v.c/v.t*100),col=gp>=80?'#639922':gp>=60?'#E85D04':'#C41E3A';
    b+='<div class="score-bar-item"><div class="score-bar-label"><span>'+g.replace('กลุ่มที่ ','กลุ่ม ')+'</span><span style="color:'+col+'">'+v.c+'/'+v.t+'</span></div><div class="score-bar-track"><div class="score-bar-fill" style="width:'+gp+'%;background:'+col+'"></div></div></div>';
  });
  document.getElementById('scoreBars').innerHTML=b;
  if(!rev) await sendToSheet(correct,Q.length,pct);
  loadStats();
  scrollTo(0,0);
}

async function sendToSheet(score,total,pct){
  const st=document.getElementById('sendStatus');
  st.className='send-status sending';
  st.textContent='⏳ กำลังบันทึกผลไปยัง Google Sheet...';
  try{
    await fetch(SHEET_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:TOKEN,name:userName,ward:userWard,score,total,pct})
    });
    st.className='send-status ok';
    st.textContent='✅ บันทึกผลสำเร็จแล้ว — ขอบคุณที่ร่วมทำแบบทดสอบค่ะ 🙏';
  }catch(e){
    st.className='send-status err';
    st.textContent='⚠ บันทึกไม่สำเร็จ — ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
  }
}

function startReview(){
  rev=true;cur=0;
  ['caseBox','progressWrap','quizWrap'].forEach(id=>document.getElementById(id).style.display='block');
  document.getElementById('bottomNav').style.display='flex';
  document.getElementById('scoreScreen').style.display='none';
  render();scrollTo(0,0);
}

function restart(){
  rev=false;cur=0;ans=new Array(Q.length||QUIZ_LEN).fill(null);userName='';userWard='';activeCase=null;
  ['caseBox','progressWrap','quizWrap','bottomNav'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('scoreScreen').style.display='none';
  document.getElementById('introScreen').style.display='block';
  document.getElementById('inputName').value='';
  document.getElementById('inputWard').value='';
  document.getElementById('inputOtherWard').value='';
  document.getElementById('otherWardWrap').style.display='none';
  document.getElementById('btnStart').disabled=true;
  const sb=document.getElementById('statsBox');
  if(sb){ sb.hidden=true; sb.innerHTML=''; }
  scrollTo(0,0);
}
</script>
</body>
</html>
